name: Agent Cron (adaptive loop)

# Frequent autonomous trigger for the multi-agent scheduler.
# Vercel Hobby only permits a DAILY cron, so we drive /api/cron/run-due from
# GitHub Actions every ~15 min instead. run-due processes a bounded batch of due
# scheduled jobs (monitor -> adaptation -> remediation sequences) and reschedules.
#
# ONE-TIME ACTIVATION:
#   1. Push this repo to GitHub (sahit1011/Archerreview-Lite) so the workflow exists.
#   2. Repo -> Settings -> Secrets and variables -> Actions -> New repository secret:
#        Name:  CRON_SECRET     Value: <the same value as the Vercel CRON_SECRET env var>
#   3. (Optional) Add a repository *variable* CRON_URL to point at a different
#      deployment; otherwise it defaults to the production alias below.
#
# NOTE: GitHub's scheduled runs are best-effort and may be delayed under load;
# expect roughly-every-15-min, not to-the-second. Active users still get instant
# re-planning via the event trigger on task completion/skip.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: agent-cron
  cancel-in-progress: false

jobs:
  run-due:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger due agent jobs
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CRON_URL: ${{ vars.CRON_URL || 'https://studyarc-alpha.vercel.app/api/cron/run-due' }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set. Add it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' -X POST "$CRON_URL" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H 'content-type: application/json' \
            --max-time 120)
          echo "HTTP $code"
          cat /tmp/resp.json 2>/dev/null || true
          echo
          test "$code" = "200"
